name: Build WizardBypass (No Substrate)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Install ldid (code signing tool)
      run: |
        brew install ldid

    - name: Install iOS SDK
      run: |
        cd $HOME/theos
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip master.zip
        mv sdks-master/iPhoneOS*.sdk sdks/

    - name: Build Wizard bypass tweak (NO SUBSTRATE)
      run: |
        export THEOS=$HOME/theos
        cd ${{ github.workspace }}
        rm -rf .theos
        make -f Makefile.wizard clean
        make -f Makefile.wizard FINALPACKAGE=1
        # Find the actual dylib (not dSYM)
        find .theos -name "*.dylib" -type f ! -path "*.dSYM/*"
        # Copy the real dylib
        cp .theos/obj/debug/arm64/WizardBypass.dylib ./WizardBypass.dylib || \
        cp .theos/obj/WizardBypass.dylib ./WizardBypass.dylib || \
        find .theos -name "WizardBypass.dylib" -type f ! -path "*.dSYM/*" -exec cp {} ./WizardBypass.dylib \;
        ls -lh WizardBypass.dylib
        file WizardBypass.dylib

    - name: Verify no CydiaSubstrate dependency
      run: |
        cd ${{ github.workspace }}
        otool -L WizardBypass.dylib
        if otool -L WizardBypass.dylib | grep -i "CydiaSubstrate"; then
          echo "ERROR: CydiaSubstrate dependency found!"
          exit 1
        fi
        echo "✓ No CydiaSubstrate dependency - build successful!"

    - name: Upload Wizard bypass dylib
      uses: actions/upload-artifact@v4
      with:
        name: WizardBypass-dylib
        path: WizardBypass.dylib
